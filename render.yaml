services:
  - type: web
    name: autonomous-sales-research-agent
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: HUNTER_API_KEY
        sync: false
      - key: VAPI_PRIVATE_KEY
        sync: false
      - key: VAPI_PHONE_NUMBER_ID
        sync: false
